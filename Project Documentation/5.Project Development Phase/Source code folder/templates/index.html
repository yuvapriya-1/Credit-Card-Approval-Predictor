<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>💳 Credit Card Approval Predictor</h2>
        <p>Enter the applicant's details below to verify application eligibility status.</p>
        
        <form id="predictionForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="age">Age (Years)</label>
                    <input type="number" id="age" name="age" value="30" required min="18" max="100">
                </div>

                <div class="form-group">
                    <label for="income">Total Annual Income ($)</label>
                    <input type="number" id="income" name="income" value="50000" required>
                </div>
                <div class="form-group">
                    <label for="years_employed">Years Employed</label>
                    <input type="number" id="years_employed" name="years_employed" value="3" step="0.1" required>
                </div>

                <div class="form-group">
                    <label for="income_type">Income Type</label>
                    <select id="income_type" name="income_type">
                        <option value="Working">Working</option>
                        <option value="Commercial associate">Commercial Associate</option>
                        <option value="Pensioner">Pensioner</option>
                        <option value="State servant">State Servant</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="education">Education Type</label>
                    <select id="education" name="education">
                        <option value="Secondary / secondary special">Secondary Education</option>
                        <option value="Higher education">Higher Education</option>
                        <option value="Incomplete higher">Incomplete Higher</option>
                        <option value="Lower secondary">Lower Secondary</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="own_car">Owns a Car?</label>
                    <select id="own_car" name="own_car">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="own_property">Owns Property?</label>
                    <select id="own_property" name="own_property">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn">Analyze Application</button>
        </form>

        <div id="result" class="result-box hidden"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
